name: Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    runs-on: ubuntu-latest

    # contents:read is needed to check out the repo;
    # packages:write lets us push to ghcr.io for this repo's owner.
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # GHCR requires a lowercase image path. github.repository can carry
      # mixed case (e.g. SamTV12345/echarge) so we normalise it once.
      - name: Normalise image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push (skip for PRs from forks).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          # Pull requests only verify that the image builds; push happens on
          # branch/tag events.
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache for faster subsequent builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update values.yaml with new digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          DIGEST="${{ steps.build.outputs.digest }}"
          IMAGE_REF="${REGISTRY}/${IMAGE_NAME_LC}"
          if [ -z "$DIGEST" ]; then
            echo "::error::No digest produced by build step" >&2
            exit 1
          fi
          cat > values.yaml <<EOF
          # Managed by .github/workflows/docker.yml — do not edit by hand.
          # Updated automatically after every successful image push.
          image:
            repository: ${IMAGE_REF}
            tag: "${DIGEST}"
          EOF
          echo "Wrote digest ${DIGEST} to values.yaml"

      - name: Commit and push values.yaml
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add values.yaml
          if git diff --cached --quiet; then
            echo "No changes to values.yaml — skipping commit."
            exit 0
          fi
          git commit -m "chore: bump image digest to ${DIGEST} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

